<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Price Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 400px;
      max-height: 550px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4e;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h2 { font-size: 16px; color: #00d4ff; }
    .header .count {
      background: #00d4ff;
      color: #0f0f1a;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .status {
      font-size: 12px;
      padding: 8px 16px;
      background: #16213e;
      border-left: 3px solid #f39c12;
    }
    .status.loading { border-left-color: #f39c12; }
    .status.connected { border-left-color: #00d4ff; }
    .status.error { border-left-color: #e74c3c; }

    /* Result card per POS product */
    .result-card {
      padding: 12px 16px;
      border-bottom: 1px solid #1f1f3a;
    }
    .result-card .name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #fff;
    }
    .result-card .match-info {
      font-size: 10px;
      color: #888;
      margin-bottom: 6px;
    }
    .match-info .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .dot.high { background: #28a745; }
    .dot.medium { background: #ffc107; }
    .dot.low { background: #fd7e14; }
    .dot.none { background: #666; }

    .price-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .price-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid;
      white-space: nowrap;
      transition: transform 0.12s;
    }
    .price-tag:hover { transform: scale(1.05); }
    .price-tag .label { opacity: 0.8; font-weight: 500; }
    .price-tag .amount { font-weight: 700; }

    .price-tag.ryans { background: #e8f5e9; border-color: #4caf50; color: #1b5e20; }
    .price-tag.startech { background: #e3f2fd; border-color: #2196f3; color: #0d47a1; }
    .price-tag.daraz { background: #fff3e0; border-color: #ff9800; color: #e65100; }
    .price-tag.other { background: #f0f0f0; border-color: #bbb; color: #333; }

    .no-match {
      font-size: 11px;
      color: #666;
      font-style: italic;
    }

    .btn {
      display: block;
      width: calc(100% - 32px);
      margin: 12px 16px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: #00d4ff; color: #0f0f1a; }
    .btn-primary:hover { background: #00b8d4; }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }

    .legend { font-size:10px; color:#555; padding:8px 16px; border-top:1px solid #1f1f3a; }
    .legend div { margin:2px 0; }

    .dev-credit {
      padding:10px 16px;
      background:#15355a;
      color:#c0d8f0;
      font-size:12px;
      text-align:center;
      border-top:1px solid #1f4a7a;
    }
    .dev-credit strong { color:#fff; font-weight:700; }
    .dev-credit a { color:#4fc3f7; text-decoration:none; font-weight:500; }
    .dev-credit a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="header">
    <h2>🏷️ Price Tracker</h2>
    <span class="count" id="count">0</span>
  </div>

  <div id="status" class="status loading">Loading…</div>
  <div id="results"></div>

  <button id="syncBtn" class="btn btn-primary" disabled>🔄 Sync Prices</button>

  <div class="legend">
    <div><span class="dot high"></span> High match (≥85%)</div>
    <div><span class="dot medium"></span> Medium match (70-84%)</div>
    <div><span class="dot low"></span> Low match (60-69%)</div>
  </div>

  <footer class="dev-credit">
    Developer: <strong>Arman azij</strong> · <a href="https://armanazij.me" target="_blank" rel="noopener">armanazij.me</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
